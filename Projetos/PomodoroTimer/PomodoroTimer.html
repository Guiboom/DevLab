<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TituloModelo</title>
    <link rel="stylesheet" href="style/style.css">
</head>

<body>
    <header>
        <h1>Pomodoro Timer</h1>
        <img class="coverImage" src="img/imageLogo.png"
            alt="Uma imagem que representa uma Árvore da Programação, onde a tecnologia é tratada de forma orgânica e artística.">
    </header>
    <main>
        <div id="timer">
            <div id="btntimer">
                <button class="btntmp" id="Pomodoro">Pomodoro</button>
                <button class="btntmp" id="PausaC">Pausa Curta</button>
                <button class="btntmp" id="PausaL">Pausa Longa</button>
            </div>

            <div id="Tempotxt">25:00</div>

            <div id="Começar">
                <button class="btntmpcomecar" id="bttStartStop">Começar</button>
            </div>
        </div>

    </main>
    <footer>
        <p>© 2026 Guilherme Antonio Mantoanelli (Guiboom) — Projeto educacional e portfólio pessoal.</p>
        <nav class="footer-links">
            <a href="../../index.html">Início</a>
            <a href="https://github.com/Guiboom" target="_blank">GitHub</a>
        </nav>
    </footer>
    <script src="script/script.js"></script>
</body>

</html>
